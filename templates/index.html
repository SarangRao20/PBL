<!DOCTYPE html>
<html>
<head>
    <title>Research Paper Q&A</title>
</head>
<body>
    <h2>Ask a question</h2>

    <form method="POST">
        <input type="text" name="question" size="80" required>
        <br><br>
        <button type="submit">Ask</button>
    </form>

    {% if answer %}
        <h3>Answer</h3>
        <p>{{ answer }}</p>

        <h3>Sources</h3>
        {% for chunk, score in sources %}
            <p><b>Relatedness:</b> {{ score }}%</p>
            <p>{{ chunk }}</p>
            <hr>
        {% endfor %}
    {% endif %}
</body>
</html>

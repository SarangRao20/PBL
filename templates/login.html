<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | PBL Research Platform</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="logo">PBL Platform</div>
            <h1>Welcome Back</h1>
            <p>Access your research and teaching insights.</p>
            
            <form action="/login" method="POST" class="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <label for="role">Access Level</label>
                    <select id="role" name="role">
                        <option value="student">Student</option>
                        <option value="teacher">Professor / Researcher</option>
                    </select>
                </div>

                <button type="submit" class="login-btn">Sign In</button>
            </form>
            
            {% if error %}
            <p class="status-msg error" style="margin-top: 1.5rem;">{{ error }}</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
